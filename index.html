<!DOCTYPE html>
<html>

<head>
<title>Mayank Portfolio</title>

<style>

body {
margin: 0;
font-family: 'Segoe UI', sans-serif;
background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
color: white;
}

/* NAVBAR */
nav {
display: flex;
justify-content: space-between;
padding: 15px 30px;
position: sticky;
top: 0;
background: rgba(255,255,255,0.05);
backdrop-filter: blur(10px);
}

nav a {
color: white;
text-decoration: none;
margin-left: 15px;
}

/* HERO */
.hero {
text-align: center;
padding: 100px 20px;
}

.profile {
width: 140px;
height: 140px;
border-radius: 50%;
border: 3px solid #00c6ff;
box-shadow: 0 0 25px #00c6ff;
}

h1 {
font-size: 40px;
background: linear-gradient(45deg, #00c6ff, #0072ff);
-webkit-background-clip: text;
color: transparent;
}

/* BUTTON */
.resume-btn, .btn {
padding: 10px 20px;
background: linear-gradient(45deg, #00c6ff, #0072ff);
border: none;
border-radius: 20px;
color: white;
cursor: pointer;
margin-top: 10px;
transition: 0.3s;
}

.resume-btn:hover, .btn:hover {
transform: scale(1.1);
box-shadow: 0 0 20px #00c6ff;
}

/* SECTIONS */
section {
padding: 80px 20px;
text-align: center;
opacity: 0;
transform: translateY(50px);
transition: 1s;
}

section.show {
opacity: 1;
transform: translateY(0);
}

/* PROJECTS */
.projects {
display: flex;
flex-wrap: wrap;
justify-content: center;
gap: 20px;
}

.card {
width: 260px;
background: rgba(255,255,255,0.08);
border-radius: 15px;
overflow: hidden;
transition: 0.3s;
}

.card img {
width: 100%;
height: 150px;
object-fit: cover;
}

.card:hover {
transform: scale(1.05);
box-shadow: 0 0 20px #00c6ff;
}

.card-content {
padding: 15px;
}

/* FORM */
form {
background: rgba(255,255,255,0.08);
padding: 20px;
width: 300px;
margin: auto;
border-radius: 15px;
}

input {
width: 100%;
padding: 10px;
margin: 10px 0;
border: none;
border-radius: 5px;
}

footer {
text-align: center;
padding: 20px;
}

</style>

</head>

<body>

<nav>
<div><b>Mayank</b></div>
<div>
<a href="#home">Home</a>
<a href="#about">About</a>
<a href="#projects">Projects</a>
<a href="#contact">Contact</a>
</div>
</nav>

<section id="home" class="hero">

<img src="image/profile.jpg" class="profile">

<h1>Hi, I'm Mayank 👋</h1>
<p>I design modern UI interfaces</p>

<a href="resume/Mayank_Resume.pdf" download>
<button class="resume-btn">Download Resume</button>
</a>

</section>

<section id="about">
<h2>About Me</h2>
<p>I create modern and user-friendly designs.</p>
</section>

<section>
<h2>My Skills</h2>
<p>HTML | CSS | UI Design | Figma</p>
</section>

<section id="projects">
<h2>My Projects</h2>

<div class="projects">

<div class="card">
<img src="image/project1.jpg">
<div class="card-content">
<h3>Portfolio</h3>
<a href="#" class="btn">View</a>
</div>
</div>

<div class="card">
<img src="image/project2.jpg">
<div class="card-content">
<h3>Login UI</h3>
<a href="#" class="btn">View</a>
</div>
</div>

</div>

</section>

<section id="contact">
<h2>Contact</h2>

<form>
<input type="text" placeholder="Name">
<input type="email" placeholder="Email">
<button class="resume-btn">Send</button>
</form>

</section>

<footer>
<p>© 2026 Mayank</p>
</footer>

<!-- JAVASCRIPT -->
<script>

// SCROLL ANIMATION
const sections = document.querySelectorAll("section");

window.addEventListener("scroll", () => {
sections.forEach(sec => {
const top = sec.getBoundingClientRect().top;
if(top < window.innerHeight - 100){
sec.classList.add("show");
}
});
});

// BUTTON CLICK EFFECT
const buttons = document.querySelectorAll("button");

buttons.forEach(btn => {
btn.addEventListener("click", () => {
btn.innerText = "Clicked!";
setTimeout(() => {
btn.innerText = "Send";
}, 1000);
});
});

</script>

</body>
</html>
